name: Search & Download from SoundCloud (maxQ)

on:
  workflow_dispatch:
    inputs:
      song_name:
        description: 'What are you looking for?'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Search and Download
        run: |
          SONG_NAME="${{ inputs.song_name }}"
          
          python << EOF
          import requests
          import json
          import os

          song_name = "${SONG_NAME}"
          
          
          url = "https://api.soundcloud.com/search/tracks"
          params = {
              "q": song_name,
              "limit": 1,
              "linked_partitioning": 1
          }
          
          response = requests.get(url, params=params)
          data = response.json()
          
          if "collection" in data and len(data["collection"]) > 0:
              track = data["collection"][0]
              if "http_nonblocking_url" in track:
                  download_url = track["http_nonblocking_url"]
                  
                  
                  file_response = requests.get(download_url)
                  if file_response.status_code == 200:
                      with open("audio.mp3", "wb") as f:
                          f.write(file_response.content)
                      print("Download successful!")
                  else:
                      print("Error: Failed to download file.")
                      exit(1)
              else:
                  print("Error: No download URL found.")
                  exit(1)
          else:
              print("Error: No tracks found.")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add audio.mp3
          git commit -m "Added audio for: ${{ inputs.song_name }}" || true
          git push
