name: Search & Download from SoundCloud (maxQ)

on:
  workflow_dispatch:
    inputs:
      song_name:
        description: 'What are you looking for?'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ffmpeg

      - name: Search and Download
        run: |
          SONG_NAME="${{ inputs.song_name }}"
          SEARCH_URL="https://api.soundcloud.com/search/tracks?q=${SONG_NAME}&limit=1&linked_partitioning=1"
          RESPONSE=$(curl -s "$SEARCH_URL")
          DOWNLOAD_URL=$(echo "$RESPONSE" | grep -o '"http_nonblocking_url":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: Could not find download URL."
            exit 1
          fi
          curl -L -o "audio.mp3" "$DOWNLOAD_URL"
          if [ -f "audio.mp3" ]; then
            ls -lh audio.mp3
          else
            echo "Error: Download failed."
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add audio.mp3
          git commit -m "Added audio for: ${{ inputs.song_name }}" || true
          git push
