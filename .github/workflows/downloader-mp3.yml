name: Download MP3 by ID (maxQ)

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'ID?'
        required: true
        type: string

jobs:
  download_audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq

      - name: Download Audio
        run: |
          VIDEO_ID="${{ inputs.video_id }}"
          YOUTUBE_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
          RESPONSE=$(curl -s -X POST "https://api.cobalt.tools/api/json" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d "{\"url\":\"${YOUTUBE_URL}\",\"isAudioOnly\":true,\"audioFormat\":\"mp3\",\"noRedirection\":true}")
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.url')
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "Error: Failed to get download link."
            echo "$RESPONSE"
            exit 1
          fi
          curl -L -o "audio.mp3" "$DOWNLOAD_URL"
          if [ ! -f "audio.mp3" ]; then
            echo "Error: Download failed."
            exit 1
          fi

      - name: Commit and Push Audio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add audio.mp3
          git commit -m "Added audio via Cobalt for ID: ${{ inputs.video_id }}" || true
          git push
