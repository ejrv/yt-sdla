name: Download MP3 by ID (maxQ)

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'ID?'
        required: true
        type: string

jobs:
  download_audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq ffmpeg

      - name: Download Audio
        run: |
          VIDEO_ID="${{ inputs.video_id }}"
          INFO=$(curl -s "https://yewtu.be/api/v1/videos/${VIDEO_ID}")
          AUDIO_URL=$(echo "$INFO" | jq -r '.adaptiveFormats[] | select(.mimeType | contains("audio")) | .url' | head -n 1)
          if [ -z "$AUDIO_URL" ] || [ "$AUDIO_URL" == "null" ]; then
            echo "Error: Could not find audio stream."
            exit 1
          fi
          curl -L -o "temp_audio.m4a" "$AUDIO_URL"
          if [ ! -f "temp_audio.m4a" ]; then
            echo "Error: Download failed."
            exit 1
          fi
          ffmpeg -i "temp_audio.m4a" -b:a 320k -y "audio.mp3"
          rm "temp_audio.m4a"
          ls -lh audio.mp3

      - name: Commit and Push Audio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add audio.mp3
          git commit -m "Added audio via Invidious for ID: ${{ inputs.video_id }}" || true
          git push
