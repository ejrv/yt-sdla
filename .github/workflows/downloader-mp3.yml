name: Download MP3 by ID (maxQ)

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'ID?'
        required: true
        type: string

jobs:
  download_audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yt-dlp ffmpeg

      - name: Download Audio
        run: |
          VIDEO_ID="${{ inputs.video_id }}"
          yt-dlp -x --audio-format best --audio-quality 0 -o "temp_audio.%(ext)s" "https://www.youtube.com/watch?v=${VIDEO_ID}" --user-agent "Mozilla/5.0 (Linux; Android 10; SM-G975F) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.120 Mobile Safari/537.36"
          AUDIO_FILE=$(ls temp_audio.* 2>/dev/null | head -n 1)
          if [ -z "$AUDIO_FILE" ]; then
            echo "Error: Audio download failed."
            exit 1
          fi
          ffmpeg -i "$AUDIO_FILE" -b:a 320k -y "audio.mp3"
          rm "$AUDIO_FILE"
          ls -lh audio.mp3

      - name: Commit and Push Audio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add audio.mp3
          git commit -m "Added audio via yt-dlp Mobile UA for ID: ${{ inputs.video_id }}" || true
          git push
