name: Download MP3 by ID (maxQ)

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'ID?'
        required: true
        type: string

jobs:
  download_audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq ffmpeg

      - name: Download Audio
        run: |
          VIDEO_ID="${{ inputs.video_id }}"
          RESPONSE=$(curl -s -X POST "https://ttml.sh/api/v1/download" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"https://www.youtube.com/watch?v=${VIDEO_ID}\",\"format\":\"audio\"}")
          
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.downloadUrl // .url')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "Error: Failed to get download link."
            echo "$RESPONSE"
            exit 1
          fi
          
          curl -L -o "temp_audio.mp3" "$DOWNLOAD_URL"
          
          if [ ! -f "temp_audio.mp3" ]; then
            echo "Error: Download failed."
            exit 1
          fi
          
          ls -lh temp_audio.mp3

      - name: Commit and Push Audio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add temp_audio.mp3
          git mv temp_audio.mp3 audio.mp3
          git commit -m "Added audio via TTML for ID: ${{ inputs.video_id }}" || true
          git push
